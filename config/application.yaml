yfinance:
  # ソリューションはインクリメンタルに実行される可能性がありますが
  # インサイトを得るのに十分な過去データを確保します
  mindate: '2018-05-01'
  maxdate: '2020-05-01'

model:
  # MLFlowレジストリに登録されるpyfuncモデルの名前
  name: 'value_at_risk'
  # モデルを訓練する日付（yfinanceの終了日より前）
  date: '2019-09-01'

database:
  # すべてのDeltaテーブルはこのデータベース配下の外部マネージドテーブルとして保存される
  name: 'solacc_var'
  path: '/FileStore/solution_accelerators/var/database'
  tables:
    stocks: 'market_data'
    indicators: 'market_indicators'
    volatility: 'market_volatility'
    mc_market: 'monte_carlo_market'
    mc_trials: 'monte_carlo_trials'

monte-carlo:
  # 利用可能なノード数の制御
  executors: 20
  # 過去のボラティリティ計算に使用する履歴期間（日数）
  volatility: 90
  # 各銘柄のシミュレーション回数
  runs: 32000
